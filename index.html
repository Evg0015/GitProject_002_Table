<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Поиск чисел</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f3f3f3;
    font-family:Arial,sans-serif;
    height:100vh;
}

.wrapper{
    display:flex;
    height:100vh;
}

.left{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.game-box{
    width:100%;
    height:100%;
    max-width:1200px;
    max-height:900px;

    background:white;
    border:2px solid #ccc;
    border-radius:12px;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

#gameCanvas{
    max-width:100%;
    max-height:100%;
    cursor:pointer;
    display:block;
}

.right{
    width:320px;
    background:white;
    border-left:2px solid #ddd;

    padding:30px;

    display:flex;
    flex-direction:column;
    gap:30px;
}

.card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
}

.label{
    font-size:14px;
    color:#666;
    margin-bottom:10px;
}

.value{
    font-size:54px;
    font-weight:bold;
}

#timer{
    font-size:42px;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>
<body>

<div class="wrapper">

    <div class="left">
        <div class="game-box">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div class="right">

        <div class="card">
            <div class="label">Следующее число</div>
            <div id="target" class="value">1</div>
        </div>

        <div class="card">
            <div class="label">Время</div>
            <div id="timer">0.0</div>
        </div>

        <div class="card">
            <div class="label">Прогресс</div>
            <div id="progress" class="value">0/90</div>
        </div>

        <div class="card">
            <div class="label">Статус</div>
            <div id="status">Ждём первый клик</div>
        </div>

    </div>

</div>

<script>

const TOTAL_NUMBERS = 90;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const hiddenCanvas = document.createElement("canvas");
const hiddenCtx = hiddenCanvas.getContext("2d");

const gameImg = new Image();
const maskImg = new Image();

let currentNumber = 1;
let started = false;
let finished = false;
let startTime = 0;

gameImg.src = "game.png";
maskImg.src = "mask.png";

Promise.all([
    new Promise(resolve => gameImg.onload = resolve),
    new Promise(resolve => maskImg.onload = resolve)
]).then(init);

function init(){

    canvas.width = gameImg.width;
    canvas.height = gameImg.height;

    hiddenCanvas.width = maskImg.width;
    hiddenCanvas.height = maskImg.height;

    ctx.drawImage(gameImg,0,0);
    hiddenCtx.drawImage(maskImg,0,0);

    canvas.addEventListener("click", onClick);

    requestAnimationFrame(updateTimer);
}

function onClick(event){

    if(finished) return;

    if(!started){
        started = true;
        startTime = performance.now();
    }

    const rect = canvas.getBoundingClientRect();

    const x =
        (event.clientX - rect.left)
        * canvas.width
        / rect.width;

    const y =
        (event.clientY - rect.top)
        * canvas.height
        / rect.height;

    const pixel = hiddenCtx
        .getImageData(Math.floor(x), Math.floor(y), 1, 1)
        .data;

    const clickedNumber = pixel[2];

    if(clickedNumber === currentNumber){

        document.getElementById("status").textContent =
            "✓ Верно";

        document.getElementById("status").className =
            "success";

        currentNumber++;

        document.getElementById("target").textContent =
            currentNumber <= TOTAL_NUMBERS
            ? currentNumber
            : "✓";

        document.getElementById("progress").textContent =
            `${currentNumber-1}/${TOTAL_NUMBERS}`;

        if(currentNumber > TOTAL_NUMBERS){

            finished = true;

            const finalTime =
                ((performance.now() - startTime)/1000)
                .toFixed(2);

            document.getElementById("status").textContent =
                `Победа за ${finalTime} сек`;

            alert(
                "Поздравляем!\n\n" +
                "Время: " +
                finalTime +
                " сек"
            );
        }
    }
    else if(clickedNumber !== 0){

        document.getElementById("status").textContent =
            `✗ Нажата ${clickedNumber}`;

        document.getElementById("status").className =
            "error";
    }
}

function updateTimer(){

    if(started && !finished){

        const sec =
            ((performance.now() - startTime)/1000)
            .toFixed(1);

        document.getElementById("timer").textContent =
            sec;
    }

    requestAnimationFrame(updateTimer);
}

</script>

</body>
</html>
